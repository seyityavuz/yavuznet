name: Film Scraper

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: film-json-update
  cancel-in-progress: true

jobs:
  update-films:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run film scraper
        run: |
          python film.py

      - name: Configure Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Commit and push film.json (SAFE)
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN2 }}
        run: |
          git add film.json
          git commit -m "Film listesi güncellendi [GitHub Actions]" || echo "No changes to commit"
          git push https://x-access-token:${PAT_TOKEN2}@github.com/seyityavuz/yavuznet.git main
